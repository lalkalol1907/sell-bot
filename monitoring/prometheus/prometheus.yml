global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]
        labels:
          instance: host

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]

  - job_name: loki
    static_configs:
      - targets: [loki:3100]

  - job_name: promtail
    static_configs:
      - targets: [promtail:9080]

  - job_name: grafana
    metrics_path: /metrics
    static_configs:
      - targets: [grafana:3000]

  - job_name: sellbot-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: [core:8080]
        labels:
          service: core

  - job_name: sellbot-matching
    metrics_path: /metrics
    static_configs:
      - targets: [matching:8000]
        labels:
          service: matching

  - job_name: sellbot-seller-bot
    metrics_path: /metrics
    static_configs:
      - targets: [seller-bot:9090]
        labels:
          service: seller-bot

  - job_name: sellbot-worker-engine
    metrics_path: /metrics
    static_configs:
      - targets: [worker-engine:9102]
        labels:
          service: worker-engine

  - job_name: sellbot-login-gateway
    metrics_path: /metrics
    static_configs:
      - targets: [login-gateway:8080]
        labels:
          service: login-gateway

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
          - /etc/prometheus/blackbox-targets.yml
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: docker-services
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_prometheus_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_docker_container_label_prometheus_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_docker_container_label_prometheus_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: project
