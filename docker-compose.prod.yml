services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.5
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    volumes:
      - nats_data:/data
    restart: unless-stopped

  core:
    image: ${CORE_IMAGE_NAME}:${IMAGE_TAG}
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      GRPC_SERVER_PORT: "50051"
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN}
      NATS_URL: nats://nats:4222
      JAVA_OPTS: -Xmx384m
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/actuator/prometheus"

  matching:
    image: ${MATCHING_IMAGE_NAME}:${IMAGE_TAG}
    environment:
      CORE_GRPC_ADDR: core:50051
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      QDRANT_URL: http://qdrant:6333
      GRPC_PORT: "50052"
      MODELS_LOCAL_DIR: /data/models
      NLP_V2_ENABLED: ${NLP_V2_ENABLED}
      NLP_V2_SEMANTIC: ${NLP_V2_SEMANTIC}
      NLP_V2_INTENT_ML: ${NLP_V2_INTENT_ML}
      NLP_V2_NORMALIZE: ${NLP_V2_NORMALIZE}
      MODELS_SKIP_S3: ${MODELS_SKIP_S3}
      MODELS_S3_ENDPOINT: ${MODELS_S3_ENDPOINT}
      MODELS_S3_BUCKET: ${MODELS_S3_BUCKET}
      MODELS_S3_PREFIX: ${MODELS_S3_PREFIX}
      MODELS_S3_VERSION: ${MODELS_S3_VERSION}
      MODELS_S3_REGION: ${MODELS_S3_REGION}
      MODELS_S3_ACCESS_KEY: ${MODELS_S3_ACCESS_KEY}
      MODELS_S3_SECRET_KEY: ${MODELS_S3_SECRET_KEY}
      MODELS_WATCH_ENABLED: ${MODELS_WATCH_ENABLED:-true}
      MODELS_WATCH_INTERVAL: ${MODELS_WATCH_INTERVAL:-60}
    volumes:
      - matching_models:/data/models
    depends_on:
      - core
      - redis
      - nats
      - qdrant
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"

  worker-engine:
    image: ${WORKER_ENGINE_IMAGE_NAME}:${IMAGE_TAG}
    volumes:
      - worker_data:/data
    environment:
      TG_API_ID: ${TG_API_ID}
      TG_API_HASH: ${TG_API_HASH}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY}
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN}
      CORE_GRPC_ADDR: core:50051
      NATS_URL: nats://nats:4222
      LISTEN_ALL_CHATS: ${LISTEN_ALL_CHATS}
      LOGIN_GRPC_PORT: "50053"
      METRICS_ADDR: :9102
    depends_on:
      - core
      - matching
      - nats
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=9102"
      - "prometheus.path=/metrics"

  http-gateway:
    image: ${HTTP_GATEWAY_IMAGE_NAME}:${IMAGE_TAG}
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN}
      CORE_GRPC_ADDR: core:50051
      WORKER_LOGIN_GRPC_ADDR: ${WORKER_LOGIN_GRPC_ADDR}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOGIN_ROUTE_TTL_SEC: ${LOGIN_ROUTE_TTL_SEC}
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - core
      - worker-engine
      - redis
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=3000"
      - "prometheus.path=/metrics"

  login-miniapp:
    image: ${LOGIN_MINIAPP_IMAGE_NAME}:${IMAGE_TAG}
    depends_on:
      - http-gateway
    restart: unless-stopped

  seller-dashboard:
    image: ${SELLER_DASHBOARD_IMAGE_NAME}:${IMAGE_TAG}
    depends_on:
      - http-gateway
    restart: unless-stopped

  seller-bot:
    image: ${SELLER_BOT_IMAGE_NAME}:${IMAGE_TAG}
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      CORE_GRPC_ADDR: core:50051
      LOGIN_WEB_URL: ${LOGIN_WEB_URL}
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      BOT_TRANSPORT: webhook
      HTTP_PORT: "8080"
      WEBHOOK_URL: ${WEBHOOK_URL}
      WEBHOOK_PATH: ${WEBHOOK_PATH}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      WEBHOOK_REGISTER_ON_STARTUP: "true"
    depends_on:
      - core
      - redis
      - nats
      - worker-engine
      - http-gateway
      - login-miniapp
    restart: unless-stopped
    labels:
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/metrics"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:v1.8.1
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|var/lib/docker/.+)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.57.0
    restart: unless-stopped
    privileged: true
    command:
      - --docker_only=true
      - --store_container_labels=true
      - --housekeeping_interval=10s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      LOGIN_DOMAIN: ${LOGIN_DOMAIN}
      APP_DOMAIN: ${APP_DOMAIN}
      BOT_DOMAIN: ${BOT_DOMAIN}
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - login-miniapp
      - seller-dashboard
      - seller-bot
      - grafana
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  nats_data:
  qdrant_data:
  matching_models:
  worker_data:
  prometheus_data:
  grafana_data:
  loki_data:
  caddy-data:
  caddy-config:
