services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sellbot
      POSTGRES_PASSWORD: sellbot
      POSTGRES_DB: sellbot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sellbot"]
      interval: 5s
      timeout: 5s
      retries: 5
    labels:
      - "project=sell-bot"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "project=sell-bot"

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    labels:
      - "project=sell-bot"

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    labels:
      - "project=sell-bot"

  core:
    build:
      context: .
      dockerfile: services/core/Dockerfile
    ports:
      - "50051:50051"
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sellbot
      SPRING_DATASOURCE_USERNAME: sellbot
      SPRING_DATASOURCE_PASSWORD: sellbot
      GRPC_SERVER_PORT: 50051
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-}
      NATS_URL: nats://nats:4222
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    labels:
      - "project=sell-bot"
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/actuator/prometheus"

  matching:
    build:
      context: .
      dockerfile: services/matching/Dockerfile
    ports:
      - "50052:50052"
      - "8000:8000"
    environment:
      CORE_GRPC_ADDR: core:50051
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      GRPC_PORT: 50052
      QDRANT_URL: http://qdrant:6333
      NLP_V2_ENABLED: ${NLP_V2_ENABLED:-false}
      NLP_V2_SEMANTIC: ${NLP_V2_SEMANTIC:-true}
      NLP_V2_INTENT_ML: ${NLP_V2_INTENT_ML:-true}
      NLP_V2_NORMALIZE: ${NLP_V2_NORMALIZE:-false}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      MIN_MESSAGE_CHARS: ${MIN_MESSAGE_CHARS:-8}
      MAX_MESSAGE_CHARS: ${MAX_MESSAGE_CHARS:-2000}
    depends_on:
      - core
      - redis
      - nats
      - qdrant
    labels:
      - "project=sell-bot"
      - "prometheus.scrape=true"
      - "prometheus.port=8000"
      - "prometheus.path=/metrics"

  worker-engine:
    build:
      context: .
      dockerfile: services/worker-engine/Dockerfile
    ports:
      - "9102:9102"
    volumes:
      - worker_data:/data
    environment:
      TG_API_ID: ${TG_API_ID:-0}
      TG_API_HASH: ${TG_API_HASH:-}
      SESSION_ENCRYPTION_KEY: ${SESSION_ENCRYPTION_KEY:-}
      CORE_GRPC_ADDR: core:50051
      MATCHING_GRPC_ADDR: matching:50052
      NATS_URL: nats://nats:4222
      WORKER_SESSION_STRING: ${WORKER_SESSION_STRING:-}
      WORKER_SESSION_PATH: /data/session.json
      WORKER_ID: ${WORKER_ID:-1}
      OWNER_SELLER_ID: ${OWNER_SELLER_ID:-1}
      DEV_INJECT_MESSAGE: ${DEV_INJECT_MESSAGE:-}
      LISTEN_ALL_CHATS: ${LISTEN_ALL_CHATS:-true}
      LOGIN_GRPC_PORT: 50053
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-}
      METRICS_ADDR: :9102
    depends_on:
      - core
      - matching
      - nats
    labels:
      - "project=sell-bot"
      - "prometheus.scrape=true"
      - "prometheus.port=9102"
      - "prometheus.path=/metrics"

  login-miniapp:
    build:
      context: ./services/web
      dockerfile: apps/login-miniapp/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - http-gateway
    labels:
      - "project=sell-bot"

  seller-dashboard:
    build:
      context: ./services/web
      dockerfile: apps/seller-dashboard/Dockerfile
      args:
        VITE_BOT_USERNAME: ${BOT_USERNAME:-}
        VITE_MINIAPP_URL: ${LOGIN_WEB_URL:-http://localhost:8081/miniapp/}
    ports:
      - "8082:80"
    depends_on:
      - http-gateway
    labels:
      - "project=sell-bot"

  http-gateway:
    build:
      context: .
      dockerfile: services/http-gateway/Dockerfile
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      CORE_GRPC_ADDR: core:50051
      WORKER_LOGIN_GRPC_ADDR: ${WORKER_LOGIN_GRPC_ADDR:-worker-engine:50053}
      INTERNAL_GRPC_TOKEN: ${INTERNAL_GRPC_TOKEN:-}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081,http://localhost:8082}
      NODE_ENV: production
      PORT: 3000
    depends_on:
      - core
      - worker-engine
      - redis
    labels:
      - "project=sell-bot"
      - "prometheus.scrape=true"
      - "prometheus.port=3000"
      - "prometheus.path=/metrics"

  seller-bot:
    build:
      context: .
      dockerfile: services/seller-bot/Dockerfile
    ports:
      - "9091:8080"
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      CORE_GRPC_ADDR: core:50051
      LOGIN_WEB_URL: ${LOGIN_WEB_URL:-http://localhost:8081/miniapp/}
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      BOT_TRANSPORT: ${BOT_TRANSPORT:-polling}
      HTTP_PORT: 8080
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_PATH: ${WEBHOOK_PATH:-/telegram/webhook}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      WEBHOOK_REGISTER_ON_STARTUP: ${WEBHOOK_REGISTER_ON_STARTUP:-true}
    depends_on:
      - core
      - redis
      - nats
      - worker-engine
      - http-gateway
      - login-miniapp
    labels:
      - "project=sell-bot"
      - "prometheus.scrape=true"
      - "prometheus.port=8080"
      - "prometheus.path=/metrics"

  prometheus:
    image: prom/prometheus:v2.53.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus:/etc/prometheus:ro
      - prometheus_data:/prometheus
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9090:9090"
    labels:
      - "project=sell-bot"

  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    labels:
      - "project=sell-bot"

  loki:
    image: grafana/loki:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    labels:
      - "project=sell-bot"

  promtail:
    image: grafana/promtail:3.0.0
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    labels:
      - "project=sell-bot"

  node-exporter:
    image: prom/node-exporter:v1.8.1
    restart: unless-stopped
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|var/lib/docker/.+)($$|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    ports:
      - "9100:9100"
    labels:
      - "project=sell-bot"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.57.0
    restart: unless-stopped
    privileged: true
    command:
      - --docker_only=true
      - --store_container_labels=true
      - --housekeeping_interval=10s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - "8083:8080"
    labels:
      - "project=sell-bot"

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    labels:
      - "project=sell-bot"

volumes:
  postgres_data:
  nats_data:
  worker_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
  loki_data:
