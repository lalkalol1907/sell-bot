syntax = "proto3";

package sellbot.matching;

option java_package = "com.sellbot.proto.matching";
option java_multiple_files = true;

service MatchingService {
  rpc ProcessMessage(ProcessMessageRequest) returns (ProcessMessageResponse);
}

message ProcessMessageRequest {
  int64 worker_id = 1;
  int64 seller_id = 2;
  int64 chat_id = 3;
  int64 message_id = 4;
  int64 author_id = 5;
  string author_username = 6;
  string chat_title = 7;
  string raw_text = 8;
}

message ProcessMessageResponse {
  bool matched = 1;
  int64 lead_id = 2;
  int64 product_id = 3;
  string product_title = 4;
  double score = 5;
  string level = 6;
}
