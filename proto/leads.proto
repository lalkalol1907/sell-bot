syntax = "proto3";

package sellbot.leads;

option java_package = "com.sellbot.proto.leads";
option java_multiple_files = true;

service LeadsService {
  rpc CreateLead(CreateLeadRequest) returns (Lead);
  rpc UpdateLeadStatus(UpdateLeadStatusRequest) returns (Lead);
  rpc ListLeads(ListLeadsRequest) returns (ListLeadsResponse);
  rpc GetLeadStats(GetLeadStatsRequest) returns (LeadStats);
}

message Lead {
  int64 id = 1;
  int64 seller_id = 2;
  int64 product_id = 3;
  int64 worker_id = 4;
  int64 chat_id = 5;
  int64 message_id = 6;
  int64 author_id = 7;
  string author_username = 8;
  string raw_text = 9;
  repeated string matched_keywords = 10;
  double product_score = 11;
  double intent_score = 12;
  double score = 13;
  string level = 14;
  string status = 15;
}

message CreateLeadRequest {
  int64 seller_id = 1;
  int64 product_id = 2;
  int64 worker_id = 3;
  int64 chat_id = 4;
  int64 message_id = 5;
  int64 author_id = 6;
  string author_username = 7;
  string raw_text = 8;
  repeated string matched_keywords = 9;
  double product_score = 10;
  double intent_score = 11;
  double score = 12;
  string level = 13;
  string product_title = 14;
  string chat_title = 15;
}

message UpdateLeadStatusRequest {
  int64 id = 1;
  int64 seller_id = 2;
  string status = 3;
}

message ListLeadsRequest {
  int64 seller_id = 1;
  string status = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListLeadsResponse {
  repeated Lead leads = 1;
  int32 total = 2;
}

message GetLeadStatsRequest {
  int64 seller_id = 1;
  int32 days = 2;
}

message LeadStats {
  int32 total = 1;
  int32 new_count = 2;
  int32 contacted = 3;
  int32 closed = 4;
  int32 spam = 5;
}
