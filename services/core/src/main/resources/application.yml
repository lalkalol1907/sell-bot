spring:
  application:
    name: sellbot-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sellbot}
    username: ${SPRING_DATASOURCE_USERNAME:sellbot}
    password: ${SPRING_DATASOURCE_PASSWORD:sellbot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

grpc:
  server:
    port: ${GRPC_SERVER_PORT:50051}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

sellbot:
  internal-grpc-token: ${INTERNAL_GRPC_TOKEN:}

logging:
  level:
    com.sellbot: INFO
