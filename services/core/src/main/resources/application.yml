spring:
  application:
    name: sellbot-core
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sellbot}
    username: ${SPRING_DATASOURCE_USERNAME:sellbot}
    password: ${SPRING_DATASOURCE_PASSWORD:sellbot}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

grpc:
  server:
    port: ${GRPC_SERVER_PORT:50051}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: sellbot-core

spring:
  data:
    redis:
      url: ${REDIS_URL:redis://redis:6379/0}

sellbot:
  internal-grpc-token: ${INTERNAL_GRPC_TOKEN:}
  bot-token: ${BOT_TOKEN:}
  secure-cookies: ${SELLBOT_SECURE_COOKIES:false}
  jwt:
    secret: ${JWT_SECRET:dev-jwt-secret-change-me}
    ttl-hours: ${JWT_TTL_HOURS:168}
  cors-origins: ${CORS_ORIGINS:http://localhost:8081,http://localhost:8082}
  login-web-url: ${LOGIN_WEB_URL:http://localhost:8081/miniapp/}
  login-route-ttl-sec: ${LOGIN_ROUTE_TTL_SEC:600}
  worker-login-grpc-addrs: ${WORKER_LOGIN_GRPC_ADDR:worker-engine:50053}
  nats:
    url: ${NATS_URL:nats://nats:4222}
  notifications:
    dispatch-interval-ms: 5000
    batch-size: 50
    stale-minutes: 5

logging:
  level:
    com.sellbot: INFO
