scenarios:
  # === iPhone 16 Pro Max Desert — позитив (вариативные написания) ===
  - id: iphone_pmax_desert_ru_spaces
    text: куплю айфон 16 про макс 8 128 десерт
    expect:
      matched: true
      product_id: 101
      intent_class: buy

  - id: iphone_pmax_desert_en_slash
    text: ищу iphone 16 pro max 8/128 desert
    expect:
      matched: true
      product_id: 101
      intent_class: buy

  - id: iphone_pmax_desert_short_model
    text: нужен 16 про макс 128 десерт
    expect:
      matched: true
      product_id: 101
      intent_class: buy

  - id: iphone_pmax_desert_titanium_ru
    text: хочу про макс 8 128 пустынный титан
    expect:
      matched: true
      product_id: 101
      intent_class: buy

  - id: iphone_pmax_desert_mixed_case
    text: беру IPhone 16 Pro Max 8 128 Desert
    expect:
      matched: true
      product_id: 101
      intent_class: buy

  # === iPhone 16 Pro Max Natural ===
  - id: iphone_pmax_natural_ru
    text: куплю айфон 16 про макс 8 256 натуральный
    expect:
      matched: true
      product_id: 102
      intent_class: buy

  - id: iphone_pmax_natural_en
